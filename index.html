<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Inventory Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Compact Design System */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 10px; background-color: #f1f5f9; color: #334155; }
        .main-container { border: 1px solid #cbd5e1; padding: 15px; width: 95%; margin: auto; background-color: white; border-radius: 6px; }
        
        .header-container { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; }
        .header-logo { width: 50px; height: 50px; object-fit: contain; }
        .main-title { font-size: 18px; margin: 0; color: #1e293b; }
        .sub-title { font-size: 12px; margin: 0; color: #64748b; }

        /* Compact Dashboard Cards */
        .dashboard-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .dash-card { background-color: #ffffff; border: 1px solid #e2e8f0; padding: 8px; border-radius: 4px; flex: 1; text-align: center; }
        .dash-title { font-size: 9px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; }
        .dash-value { font-size: 16px; font-weight: bold; color: #0f172a; }

        /* Compact Types Grid */
        .types-dashboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 15px; }
        .type-card { display: flex; flex-direction: column; align-items: center; background: #f8fafc; border: 1px solid #e2e8f0; padding: 6px; border-radius: 4px; }
        .type-icon { width: 25px; height: 25px; margin-bottom: 3px; object-fit: contain; }
        .type-card .dash-value { font-size: 14px; }
        .type-card .dash-title { font-size: 8px; }

        /* Controls */
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        input, select { padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 12px; }

        /* Table */
        .table-container { max-height: 400px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background-color: #f8fafc; position: sticky; top: 0; padding: 8px; text-align: left; border: 1px solid #e2e8f0; }
        td { padding: 6px 8px; border: 1px solid #e2e8f0; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 20px; border-radius: 8px; width: 400px; }
        .modal-field { margin-bottom: 10px; }
        .modal-field label { display: block; font-size: 11px; margin-bottom: 2px; }
        .modal-field input, .modal-field textarea, .modal-field select { width: 100%; box-sizing: border-box; }
        .modal-actions { display: flex; gap: 5px; margin-top: 15px; }
        .modal-btn { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; font-size: 11px; }
        .btn-edit { background: #3b82f6; color: white; }
        .btn-save { background: #10b981; color: white; }
        .btn-close { background: #ef4444; color: white; }
        .btn-upload { background: #f59e0b; color: white; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-container">
            <img src="Ph_seal_cebucity.png" alt="Seal" class="header-logo">
            <div>
                <h1 class="main-title">REAL ESTATE INVENTORY</h1>
                <p class="sub-title">Property Management Division</p>
            </div>
        </div>

        <div class="dashboard-row">
            <div class="dash-card"><div class="dash-title">Total</div><div id="countTotal" class="dash-value">0</div></div>
            <div class="dash-card"><div class="dash-title">Existing</div><div id="countExisting" class="dash-value">0</div></div>
            <div class="dash-card"><div class="dash-title">Not Found</div><div id="countNotFound" class="dash-value">0</div></div>
        </div>

        <div class="types-dashboard">
            <div class="type-card"><img src="building.png" class="type-icon"><div id="countBuilding" class="dash-value">0</div><div class="dash-title">Building</div></div>
            <div class="type-card"><img src="land.png" class="type-icon"><div id="countLand" class="dash-value">0</div><div class="dash-title">Land</div></div>
            <div class="type-card"><img src="hospital.png" class="type-icon"><div id="countHospital" class="dash-value">0</div><div class="dash-title">Hospital</div></div>
            <div class="type-card"><img src="market.png" class="type-icon"><div id="countMarket" class="dash-value">0</div><div class="dash-title">Market</div></div>
            <div class="type-card"><img src="park.png" class="type-icon"><div id="countPark" class="dash-value">0</div><div class="dash-title">Park</div></div>
            <div class="type-card"><img src="flood.png" class="type-icon"><div id="countFlood" class="dash-value">0</div><div class="dash-title">Flood</div></div>
            <div class="type-card"><img src="other.png" class="type-icon"><div id="countOther" class="dash-value">0</div><div class="dash-title">Other</div></div>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search..." disabled>
            <select id="remarksFilter" disabled><option value="ALL">All Remarks</option></select>
            <select id="typeFilter" disabled><option value="ALL">All Types</option></select>
            <select id="photoFilter" disabled>
                <option value="ALL">All Photos</option>
                <option value="WITH_PHOTO">With Photo</option>
                <option value="NO_PHOTO">No Photo</option>
            </select>
            <button id="searchButton" disabled>Filter</button>
            <button id="exportButton" disabled>Export CSV</button>
        </div>

        <div id="statusBanner" style="font-size: 11px; padding: 5px; margin-bottom: 10px; border-radius: 4px;">Loading...</div>

        <div class="table-container">
            <table>
                <thead>
                    <tr id="tableHeaderRow">
                        </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <div style="font-weight: bold; margin-bottom: 10px;">Property Details</div>
            <div id="modalFormContainer"></div>
            <div class="modal-actions">
                <button id="uploadPhotoBtn" class="modal-btn btn-upload">Upload Photo</button>
                <button id="modalEditBtn" class="modal-btn btn-edit">Edit Data</button>
                <button id="modalSaveBtn" class="modal-btn btn-save" style="display:none;">Save Changes</button>
                <button id="modalCloseBtn" class="modal-btn btn-close">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
